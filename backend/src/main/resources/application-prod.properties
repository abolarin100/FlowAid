# ── Database (PostgreSQL on Render) ───────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── H2 Console (disabled in prod) ────────────────────────────────────────────
spring.h2.console.enabled=false

# ── FlowAid ───────────────────────────────────────────────────────────────────
flowaid.cors.allowed-origins=${CORS_ORIGINS}
flowaid.transfer.provider=${TRANSFER_PROVIDER:mock}

# Disable default user auto-configuration since we handle security ourselves
spring.security.user.name=disabled
spring.security.user.password=disabled