spring.application.name=flowaid
spring.profiles.active=local

# ── Hikari Pool ───────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── FlowAid Config ────────────────────────────────────────────────────────────
flowaid.transfer.mock.failure-rate=${MOCK_FAILURE_RATE:0.05}
flowaid.async.core-pool-size=4
flowaid.async.max-pool-size=10
flowaid.async.queue-capacity=500

# ── Actuator / Monitoring ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.flowaid=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n